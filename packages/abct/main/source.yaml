# Build the MATLAB toolbox from Mika Rubinov's abct repo. abct is a combined
# MATLAB + Python project; only the MATLAB toolbox is packaged, and it lives in
# the repo under abct-matlab/abct/ (the folder that holds the .m files and the
# +muma / +loyv namespaces). subdirectory: extracts just that folder as the
# package root; the channel files below (mip.yaml, test_abct.m, this README,
# example.m) are overlaid on top of it.
#
# abct has one tag (2025.9) but the checked-in mpackage.json still reads 1.0.0
# and the project is under active development, so this is branch-tracked: the
# release-dir name (main) is the version. Do NOT add a `version:` field here,
# and leave mip.yaml's `version:` blank.
source:
  git: "https://github.com/mikarubi/abct"
  subdirectory: "abct-matlab/abct"
