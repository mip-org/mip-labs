name: treeweave
description: "Piecewise-polynomial function approximator (adaptive tree of polynomial leaves) with a MATLAB MEX binding."
version:
license: "BSD-3-Clause"
homepage: "https://github.com/DiamonDinoia/treeweave"
repository: "https://github.com/DiamonDinoia/treeweave"
dependencies: []

# Only the MATLAB binding directory goes on the path: treeweave.m (the classdef)
# plus the mwrap-generated tw_*.m stubs and the compiled treeweave_mex.<ext> that
# compile.m stages here. The rest of the fetched repo is C++ build input only.
paths:
  - path: "bindings/matlab"

extra_paths:
  examples:
    - path: "bindings/matlab/examples"

builds:
  # One CMake-driven MEX build across the two supported native arches. The C ABI
  # does runtime ISA dispatch (TREEWEAVE_C_MULTIARCH), so a single portable
  # baseline binary picks the best AVX/NEON kernel on the end-user CPU.
  #
  # Compilers: treeweave is C++20, which the channel's default Linux toolchain
  # (gcc-toolset-10) predates, so:
  #   * macOS -> clang (Apple's native toolchain; what upstream CI uses);
  #   * Linux -> default gcc, but compile.m switches to a gcc-toolset >= 11
  #             (installed via setup: below) for the actual compile.
  #
  # windows_x86_64 is NOT built: the mwrap generator (fetched by treeweave's
  # CMake to produce the MEX gateway) fails to link under MSVC (LNK2001 on its
  # flex/bison globals), and the channel's MinGW (8.1) predates C++20. See
  # README.md. (compile.m retains its MSVC/winflexbison path for if/when mwrap is
  # fixed upstream.)
  - architectures: [linux_x86_64, macos_arm64]
    compile_script: compile.m
    test_script: test_treeweave.m
    compiler:
      macos_arm64: clang
    setup:
      # ubi8 container ships neither cmake, bison/flex (mwrap's parser/lexer
      # generator, which invokes m4), nor a C++20 gcc; install all. el8's cmake
      # (3.26) is within treeweave's 3.25..3.31 range. gcc-toolset-13 keeps the
      # glibc-2.28 floor (only the compiler changes) and compile.m static-links
      # its libstdc++.
      linux:
        - "dnf install -y cmake bison flex m4 gcc-toolset-13"
      # macOS runners ship cmake + bison + flex; clang is C++20-capable.
      macos: []
