# Build the MATLAB/Octave binding from the upstream treeweave repo. The binding
# lives under bindings/matlab and is compiled entirely by treeweave's own CMake
# (the checked-in mwrap gateway + the treeweave_c_static C ABI), so the whole
# source tree is fetched and compile.m drives CMake against it.
#
# treeweave has no release tags yet (VERSION is 0.0.0), so this is branch-tracked:
# the release-dir name (main) is the version and must equal source.branch. Do NOT
# add a `version:` field here, and leave mip.yaml's `version:` blank.
source:
  git: "https://github.com/DiamonDinoia/treeweave"
  branch: "main"
  # Trim trees the MATLAB MEX build never touches (docs assets, conda recipe).
  # The C++ sources, headers, cmake/, and bindings/matlab are all kept — they are
  # the build inputs.
  remove_dirs: [docs, conda]
