name: fmm2d
description: "Flatiron Institute Fast Multipole Methods in 2D"
version:
license: "Apache-2.0"
homepage: "https://github.com/flatironinstitute/fmm2d"
repository: "https://github.com/flatironinstitute/fmm2d"
dependencies: []

# matlab/        — upstream rfmm2d.m, cfmm2d.m, lfmm2d.m, hfmm2d.m, stfmm2d.m
# matlab/numbl   — single fmm2d.numbl.js builtin + the fmm2d.wasm it dispatches
#                  through. No m-file overrides here.
paths:
  - path: "matlab"
  - path: "matlab/numbl"

builds:
  # MATLAB MEX: compiled straight from the upstream Fortran via the makefile
  # (no transpile). The plain fmm2d repo ships src/, matlab/fmm2d.c and the
  # makefile, so these need no extra channel files beyond compile*.m.
  - architectures: [linux_x86_64, macos_x86_64, macos_arm64]
    compile_script: compile.m
    test_script: test_fmm2d.m
    paths:
      - path: "matlab"
  - architectures: [windows_x86_64]
    compile_script: compile_windows.m
    test_script: test_fmm2d.m
    paths:
      - path: "matlab"

  # numbl WASM: there is no practical Fortran->WASM path, so the Fortran is
  # transpiled to C with fort2c at build time (matlab/numbl/build_wasm.sh) and
  # compiled to a standalone fmm2d.wasm with emcc. Replaces the upstream MEX
  # with the fmm2d.numbl.js builtin.
  - architectures: [numbl_wasm]
    compile_script: compile_numbl_wasm.m
    test_script: test_fmm2d.m
